<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpertHub Platform | E-School & Consultation System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { transition: all 0.2s ease; }
        body { background: #f0f4f8; }
        .dashboard-card:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .toast-notify { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: white; padding: 12px 24px; border-radius: 48px; z-index: 9999; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #6366f1; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .real-time-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: #10b981; animation: pulse 2s infinite; margin-right: 8px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; }
        .sidebar-item:hover { background: linear-gradient(90deg, #6366f120, transparent); }
        .file-upload-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; }
        .file-upload-zone:hover { border-color: #6366f1; background: #6366f110; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: white; border-radius: 16px; padding: 2rem; max-width: 90%; max-height: 90vh; overflow-y: auto; }
        .chat-message { max-width: 70%; padding: 0.75rem 1rem; border-radius: 16px; margin-bottom: 0.5rem; }
        .chat-message.sent { background: #6366f1; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .chat-message.received { background: #f3f4f6; margin-right: auto; border-bottom-left-radius: 4px; }
        .star-rating { color: #fbbf24; font-size: 1.25rem; }
        .availability-slot { padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; border: 1px solid #e5e7eb; }
        .availability-slot.selected { background: #6366f1; color: white; border-color: #6366f1; }
        .commission-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; }
    </style>
</head>
<body>
<div id="app-root"></div>
<div id="toast-container"></div>

<script>
    // ======================== CONFIGURATION ========================
    const BACKEND_URL = 'http://localhost:5000';  // Change to your deployed backend
    
    // ======================== GLOBAL STATE ========================
    let socket = null;
    let authToken = null;
    let currentUser = null;
    let currentUserRole = null;
    let appPhase = 'login'; // login, register, dashboard
    let activeTab = 'dashboard';
    let activeESchoolTab = 'bootcamps';
    
    // Data stores
    let usersData = [];
    let expertsData = [];
    let tasksData = [];
    let eventsData = [];
    let consultationsData = [];
    let bootcampsData = [];
    let shortCoursesData = [];
    let tuitionSessionsData = [];
    let examPrepsData = [];
    let careerGuidanceData = [];
    let earningsData = null;
    let withdrawalsData = [];
    let claimsData = [];
    let supportTicketsData = [];
    let notificationsData = [];
    let chatMessages = {};
    let availabilitySlots = [];
    let selectedSlots = [];

    // ======================== UTILITIES ========================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast-notify';
        const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : '🔔';
        toast.innerHTML = `${icon} ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showLoading(show) {
        let loader = document.getElementById('globalLoader');
        if (show) {
            if (!loader) {
                loader = document.createElement('div');
                loader.id = 'globalLoader';
                loader.className = 'loading-overlay';
                loader.innerHTML = '<div class="spinner"></div>';
                document.body.appendChild(loader);
            }
        } else {
            if (loader) loader.remove();
        }
    }

    async function apiCall(endpoint, method = 'GET', body = null, isFormData = false) {
        const headers = {};
        if (!isFormData) headers['Content-Type'] = 'application/json';
        if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
        const options = { method, headers };
        if (body) options.body = isFormData ? body : JSON.stringify(body);
        const res = await fetch(`${BACKEND_URL}${endpoint}`, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    function formatDate(dateStr) {
        if (!dateStr) return '—';
        return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function formatTime(timeStr) {
        if (!timeStr) return '—';
        return timeStr;
    }

    function getStatusColor(status) {
        const colors = {
            active: 'bg-green-100 text-green-700', pending: 'bg-yellow-100 text-yellow-700',
            suspended: 'bg-red-100 text-red-700', completed: 'bg-green-100 text-green-700',
            'in-progress': 'bg-blue-100 text-blue-700', assigned: 'bg-purple-100 text-purple-700',
            closed: 'bg-gray-100 text-gray-700', approved: 'bg-green-100 text-green-700',
            rejected: 'bg-red-100 text-red-700', filed: 'bg-orange-100 text-orange-700'
        };
        return colors[status] || 'bg-gray-100 text-gray-700';
    }

    // ======================== AUTH FUNCTIONS ========================
    async function login(email, password) {
        const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        if (!res.ok) throw new Error('Invalid credentials');
        const data = await res.json();
        authToken = data.token;
        currentUser = data.user;
        currentUserRole = data.user.role;
        localStorage.setItem('token', authToken);
        localStorage.setItem('user', JSON.stringify(currentUser));
        initializeSocket();
        await fetchAllDashboardData();
        appPhase = 'dashboard';
        renderDashboard();
    }

    async function register(name, email, password, phone = '') {
        const res = await fetch(`${BACKEND_URL}/api/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, phone })
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        showToast('Registration successful! Please wait for admin approval.', 'success');
        return data;
    }

    function initializeSocket() {
        if (socket) socket.disconnect();
        socket = io(BACKEND_URL, { auth: { token: authToken } });
        socket.on('data-update', handleSocketUpdate);
        socket.on('new_message', handleNewMessage);
        socket.on('notification', handleNewNotification);
    }

    function handleSocketUpdate(data) {
        if (data.type === 'experts') expertsData = data.data;
        if (data.type === 'tasks') tasksData = data.data;
        if (data.type === 'consultations') consultationsData = data.data;
        if (appPhase === 'dashboard') refreshCurrentView();
    }

    function handleNewMessage(message) {
        if (!chatMessages[message.consultation_id]) chatMessages[message.consultation_id] = [];
        chatMessages[message.consultation_id].push(message);
        if (activeTab === 'consultations') renderConsultationChat(message.consultation_id);
    }

    function handleNewNotification(notification) {
        notificationsData.unshift(notification);
        showToast(notification.title, 'info');
        updateNotificationBadge();
    }

    async function fetchAllDashboardData() {
        try {
            if (currentUserRole === 'admin') {
                const [users, experts, stats] = await Promise.all([
                    apiCall('/api/admin/users'),
                    apiCall('/api/admin/experts'),
                    apiCall('/api/admin/analytics')
                ]);
                usersData = users.users || [];
                expertsData = experts.experts || [];
            }
            
            const [consultations, events, notifications] = await Promise.all([
                apiCall('/api/common/consultations'),
                apiCall('/api/common/events'),
                apiCall('/api/common/notifications')
            ]);
            consultationsData = consultations.consultations || [];
            eventsData = events.events || [];
            notificationsData = notifications.notifications || [];
        } catch (err) {
            console.error('Error fetching data:', err);
        }
    }

    async function logout() {
        if (socket) socket.disconnect();
        authToken = null;
        currentUser = null;
        currentUserRole = null;
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        appPhase = 'login';
        activeTab = 'dashboard';
        renderLogin();
    }

    // ======================== API FUNCTIONS - EXPERT MANAGEMENT ========================
    async function createExpert(name, email, expertise, hourlyRate, bio, phone) {
        showLoading(true);
        try {
            await apiCall('/api/admin/experts/create', 'POST', {
                name, email, password: 'Expert@123', expertise: [expertise],
                hourly_rate: hourlyRate, bio, phone, send_welcome_email: true
            });
            showToast(`Expert ${name} created successfully`, 'success');
            await fetchAllDashboardData();
            refreshCurrentView();
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    async function suspendExpert(expertId, reason, type = 'temporary', days = 7) {
        showLoading(true);
        try {
            await apiCall(`/api/admin/experts/${expertId}/suspend`, 'POST', {
                suspension_type: type, reason, duration_days: days, notify_expert: true
            });
            showToast('Expert suspended', 'success');
            await fetchAllDashboardData();
            refreshCurrentView();
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    async function deleteExpert(expertId, reason) {
        if (!confirm('Are you sure you want to delete this expert?')) return;
        showLoading(true);
        try {
            await apiCall(`/api/admin/experts/${expertId}`, 'DELETE', { reason });
            showToast('Expert deleted', 'success');
            await fetchAllDashboardData();
            refreshCurrentView();
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    async function reactivateExpert(expertId) {
        try {
            await apiCall(`/api/admin/experts/${expertId}/reactivate`, 'POST', { reason: 'Admin reactivation' });
            showToast('Expert reactivated', 'success');
            await fetchAllDashboardData();
            refreshCurrentView();
        } catch (err) { showToast(err.message, 'error'); }
    }

    // ======================== API FUNCTIONS - E-SCHOOL ========================
    async function fetchESchoolData() {
        try {
            const [bootcamps, courses, tuition, exams, career] = await Promise.all([
                apiCall('/api/eschool/bootcamps'),
                apiCall('/api/eschool/short-courses'),
                apiCall('/api/eschool/tuition'),
                apiCall('/api/eschool/exam-prep'),
                apiCall('/api/eschool/career-guidance')
            ]);
            bootcampsData = bootcamps.bootcamps || [];
            shortCoursesData = courses.courses || [];
            tuitionSessionsData = tuition.sessions || [];
            examPrepsData = exams.exams || [];
            careerGuidanceData = career.guidance || [];
        } catch (err) { console.error('Error fetching eSchool data:', err); }
    }

    async function enrollInProgram(type, referenceId) {
        showLoading(true);
        try {
            await apiCall('/api/eschool/enroll', 'POST', { enrollment_type: type, reference_id: referenceId });
            showToast('Enrolled successfully!', 'success');
            await fetchESchoolData();
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    // ======================== API FUNCTIONS - CONSULTATIONS ========================
    async function requestConsultation(title, description, type, serviceId = null) {
        showLoading(true);
        try {
            await apiCall('/api/user/consultations', 'POST', { title, description, consultation_type: type, service_id: serviceId });
            showToast('Consultation request submitted', 'success');
            await fetchAllDashboardData();
            refreshCurrentView();
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    async function bookConsultation(expertId, serviceId, slotId, title, description, type) {
        showLoading(true);
        try {
            const formData = new FormData();
            formData.append('expert_id', expertId);
            formData.append('service_id', serviceId);
            formData.append('slot_id', slotId);
            formData.append('title', title);
            formData.append('description', description);
            formData.append('consultation_type', type);
            await apiCall('/api/user/consultations/book', 'POST', formData, true);
            showToast('Consultation booked successfully', 'success');
            await fetchAllDashboardData();
            refreshCurrentView();
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    async function sendChatMessage(consultationId, message) {
        try {
            await apiCall(`/api/user/consultations/${consultationId}/messages`, 'POST', { message });
            document.getElementById(`chat-input-${consultationId}`).value = '';
        } catch (err) { showToast(err.message, 'error'); }
    }

    async function fetchChatMessages(consultationId) {
        try {
            const data = await apiCall(`/api/user/consultations/${consultationId}/messages`);
            chatMessages[consultationId] = data.messages || [];
        } catch (err) { console.error('Error fetching messages:', err); }
    }

    async function uploadAttachment(consultationId, file) {
        showLoading(true);
        try {
            const formData = new FormData();
            formData.append('attachments', file);
            await apiCall(`/api/user/consultations/${consultationId}/attachments`, 'POST', formData, true);
            showToast('File uploaded', 'success');
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    // ======================== API FUNCTIONS - FINANCIAL ========================
    async function fetchEarnings() {
        try {
            const data = await apiCall('/api/expert/earnings');
            earningsData = data.summary || data;
            withdrawalsData = data.payments || [];
        } catch (err) { console.error('Error fetching earnings:', err); }
    }

    async function requestWithdrawal(amount, method) {
        showLoading(true);
        try {
            await apiCall('/api/expert/withdrawals', 'POST', {
                amount, withdrawal_method: method,
                account_details: { bank: 'Bank', account: '123456' }
            });
            showToast('Withdrawal request submitted. 7-day holding period applies.', 'success');
            await fetchEarnings();
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    async function fileClaim(consultationId, type, title, description, amount = null) {
        showLoading(true);
        try {
            await apiCall('/api/user/claims', 'POST', {
                consultation_id: consultationId, claim_type: type,
                claim_title: title, claim_description: description,
                claim_amount: amount, evidence_files: []
            });
            showToast('Claim filed successfully', 'success');
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    // ======================== API FUNCTIONS - AVAILABILITY ========================
    async function fetchAvailabilitySlots(expertId, date = '') {
        try {
            const params = date ? `?expertId=${expertId}&date=${date}` : `?expertId=${expertId}`;
            const data = await apiCall(`/api/expert/booking-slots${params}`);
            availabilitySlots = data.slots || [];
        } catch (err) { console.error('Error fetching slots:', err); }
    }

    async function setAvailability(schedule) {
        showLoading(true);
        try {
            await apiCall('/api/expert/availability', 'PUT', { schedule });
            showToast('Availability updated', 'success');
        } catch (err) { showToast(err.message, 'error'); }
        showLoading(false);
    }

    // ======================== REFRESH CURRENT VIEW ========================
    function refreshCurrentView() {
        if (appPhase === 'dashboard') renderDashboard();
    }

    function updateNotificationBadge() {
        const badge = document.getElementById('notif-badge');
        if (badge) {
            const unread = notificationsData.filter(n => !n.is_read).length;
            badge.textContent = unread;
            badge.style.display = unread > 0 ? 'flex' : 'none';
        }
    }

    // ======================== RENDER FUNCTIONS ========================
    function renderLogin() {
        document.getElementById('app-root').innerHTML = `
            <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-800">
                <div class="bg-white/95 backdrop-blur-lg rounded-2xl shadow-2xl w-full max-w-md p-8 mx-4">
                    <div class="text-center mb-8">
                        <div class="inline-block p-3 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-full mb-4">
                            <i class="fas fa-graduation-cap text-4xl text-white"></i>
                        </div>
                        <h1 class="text-3xl font-bold text-gray-800">Expert<span class="text-indigo-600">Hub</span></h1>
                        <p class="text-gray-500">E-School & Consultation Platform</p>
                        <div class="mt-3"><span class="real-time-indicator"></span><span class="text-xs text-green-700">Secure Connection</span></div>
                    </div>
                    <div id="loginError" class="bg-red-50 text-red-700 p-3 rounded-xl text-sm mb-4 hidden"></div>
                    <div class="space-y-4">
                        <div class="flex border-b border-gray-200 mb-4">
                            <button id="tabLogin" class="tab-active flex-1 py-2 text-center font-semibold" onclick="switchAuthTab('login')">Sign In</button>
                            <button id="tabRegister" class="flex-1 py-2 text-center text-gray-500" onclick="switchAuthTab('register')">Register</button>
                        </div>
                        <div id="loginForm">
                            <input type="email" id="loginEmail" placeholder="Email address" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 mb-3">
                            <input type="password" id="loginPassword" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 mb-3">
                            <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition shadow-md">Sign In</button>
                        </div>
                        <div id="registerForm" class="hidden">
                            <input type="text" id="regName" placeholder="Full Name" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 mb-3">
                            <input type="email" id="regEmail" placeholder="Email address" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 mb-3">
                            <input type="password" id="regPassword" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 mb-3">
                            <input type="text" id="regPhone" placeholder="Phone (optional)" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 mb-3">
                            <button id="registerBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition shadow-md">Create Account</button>
                        </div>
                    </div>
                    <p class="text-center text-xs text-gray-500 mt-4">Default: admin@platform.com / admin123</p>
                </div>
            </div>
        `;
        attachAuthEvents();
    }

    function switchAuthTab(tab) {
        document.getElementById('tabLogin').className = tab === 'login' ? 'tab-active flex-1 py-2 text-center font-semibold' : 'flex-1 py-2 text-center text-gray-500';
        document.getElementById('tabRegister').className = tab === 'register' ? 'tab-active flex-1 py-2 text-center font-semibold' : 'flex-1 py-2 text-center text-gray-500';
        document.getElementById('loginForm').className = tab === 'login' ? '' : 'hidden';
        document.getElementById('registerForm').className = tab === 'register' ? '' : 'hidden';
    }

    function attachAuthEvents() {
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;
            if (!email || !pwd) { showToast('Please fill all fields', 'error'); return; }
            try {
                showLoading(true);
                await login(email, pwd);
                showLoading(false);
            } catch (err) {
                showLoading(false);
                const errDiv = document.getElementById('loginError');
                errDiv.innerText = err.message;
                errDiv.classList.remove('hidden');
                setTimeout(() => errDiv.classList.add('hidden'), 3000);
            }
        };
        document.getElementById('registerBtn').onclick = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pwd = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value;
            if (!name || !email || !pwd) { showToast('Please fill required fields', 'error'); return; }
            try {
                showLoading(true);
                await register(name, email, pwd, phone);
                showLoading(false);
                showToast('Registration submitted for approval', 'success');
            } catch (err) {
                showLoading(false);
                showToast(err.message, 'error');
            }
        };
    }

    function renderDashboard() {
        if (currentUserRole === 'admin') renderAdminDashboard();
        else if (currentUserRole === 'expert') renderExpertDashboard();
        else renderUserDashboard();
    }

    // ======================== ADMIN DASHBOARD ========================
    function renderAdminDashboard() {
        const root = document.getElementById('app-root');
        const pendingUsers = usersData.filter(u => u.status === 'pending').length;
        const activeExperts = expertsData.filter(e => e.status === 'active').length;
        const activeConsultations = consultationsData.filter(c => ['pending', 'assigned', 'in_progress'].includes(c.status)).length;
        
        root.innerHTML = `
            <div class="min-h-screen bg-gray-50 flex">
                <!-- Sidebar -->
                <div class="w-64 bg-slate-900 text-white min-h-screen hidden lg:block">
                    <div class="p-6 border-b border-slate-700">
                        <i class="fas fa-graduation-cap text-2xl mr-2"></i>
                        <span class="font-bold text-xl">ExpertHub Admin</span>
                    </div>
                    <nav class="mt-4">
                        ${renderSidebarItem('dashboard', 'Dashboard', 'fa-chart-line')}
                        ${renderSidebarItem('users', 'User Management', 'fa-users', pendingUsers)}
                        ${renderSidebarItem('experts', 'Expert Management', 'fa-user-tie')}
                        ${renderSidebarItem('events', 'Events & Training', 'fa-calendar-alt')}
                        ${renderSidebarItem('consultations', 'Consultations', 'fa-comments', activeConsultations)}
                        ${renderSidebarItem('eschool', 'E-School Hub', 'fa-school')}
                        ${renderSidebarItem('earnings', 'Earnings & Payments', 'fa-dollar-sign')}
                        ${renderSidebarItem('claims', 'Client Claims', 'fa-gavel')}
                        ${renderSidebarItem('support', 'Support Tickets', 'fa-headset')}
                        ${renderSidebarItem('analytics', 'Analytics', 'fa-chart-bar')}
                    </nav>
                </div>
                
                <!-- Main Content -->
                <div class="flex-1">
                    <div class="bg-white shadow-md sticky top-0 z-10 p-4 flex justify-between items-center border-b">
                        <div class="flex items-center">
                            <button class="lg:hidden mr-3" onclick="document.querySelector('.w-64').classList.toggle('hidden')">
                                <i class="fas fa-bars text-xl"></i>
                            </button>
                            <span class="real-time-indicator"></span>

    // ======================== EVENT HANDLERS ========================
    function attachAdminEvents() {
        document.getElementById('logoutBtn').onclick = logout;
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.onclick = function() {
                const tab = this.getAttribute('onclick').match(/'([^']+)'/)[1];
                switchAdminTab(tab);
            };
        });
    }

    function attachExpertEvents() {
        document.getElementById('logoutBtn').onclick = logout;
    }

    function attachUserEvents() {
        document.getElementById('logoutBtn').onclick = logout;
    }

    function switchUserTab(tab) {
        activeTab = tab;
        refreshCurrentView();
    }

    function showCreateExpertModal() {
        const form = document.getElementById('createExpertForm');
        if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function handleCreateExpert() {
        const name = document.getElementById('newExpertName').value;
        const email = document.getElementById('newExpertEmail').value;
        const phone = document.getElementById('newExpertPhone').value;
        const expertise = document.getElementById('newExpertSpecialization').value;
        const rate = document.getElementById('newExpertRate').value;
        const bio = document.getElementById('newExpertBio').value;
        
        if (!name || !email || !expertise) {
            showToast('Please fill required fields', 'error');
            return;
        }
        
        await createExpert(name, email, expertise, rate, bio, phone);
        document.getElementById('createExpertForm').style.display = 'none';
    }

    async function handleWithdrawRequest() {
        const amount = document.getElementById('withdrawAmount').value;
        const method = document.getElementById('withdrawMethod').value;
        if (!amount || amount <= 0) {
            showToast('Please enter a valid amount', 'error');
            return;
        }
        await requestWithdrawal(parseFloat(amount), method);
    }

    async function saveAvailability() {
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const schedule = [];
        days.forEach((day, index) => {
            const start = document.getElementById(`start-${index}`).value;
            const end = document.getElementById(`end-${index}`).value;
            if (start && end) {
                schedule.push({ day: index, start, end, recurrence: 'weekly' });
            }
        });
        await setAvailability(schedule);
    }

    async function requestTimeOff() {
        const start = document.getElementById('timeOffStart').value;
        const end = document.getElementById('timeOffEnd').value;
        const reason = document.getElementById('timeOffReason').value;
        if (!start || !end) {
            showToast('Please select dates', 'error');
            return;
        }
        try {
            await apiCall('/api/expert/time-off', 'POST', { start_date: start, end_date: end, reason });
            showToast('Time off request submitted', 'success');
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    let currentChatId = null;

    function openConsultationChat(consultationId) {
        currentChatId = consultationId;
        document.getElementById('chat-modal').classList.remove('hidden');
        fetchChatMessages(consultationId);
        renderChatMessages(consultationId);
    }

    function renderChatMessages(consultationId) {
        const messages = chatMessages[consultationId] || [];
        const container = document.getElementById('chat-messages');
        if (container) {
            container.innerHTML = messages.map(m => `
                <div class="chat-message ${m.sender_id === currentUser.id ? 'sent' : 'received'}">
                    <p class="text-sm">${m.message}</p>
                    <span class="text-xs opacity-70">${m.sender_name || ''}</span>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
    }

    async function approveUser(userId) {
        try {
            await apiCall(`/api/admin/users/${userId}/approve`, 'PUT');
            showToast('User approved', 'success');
            await fetchAllDashboardData();
            refreshCurrentView();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    // ======================== BOOTSTRAP ========================
    (function init() {
        const savedToken = localStorage.getItem('token');
        const savedUser = localStorage.getItem('user');
        if (savedToken && savedUser) {
            authToken = savedToken;
            currentUser = JSON.parse(savedUser);
            currentUserRole = currentUser.role;
            initializeSocket();
            fetchAllDashboardData().then(() => {
                appPhase = 'dashboard';
                renderDashboard();
            }).catch(() => { 
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                renderLogin(); 
            });
        } else {
            renderLogin();
        }
    })();
</script>
